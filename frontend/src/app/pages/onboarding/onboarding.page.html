<ion-content [fullscreen]="true" class="onboarding-content">
  <div class="onboarding-wrap">
    <div class="hero-block">
      <div class="logo-mark">HG</div>
      <h1 class="app-name">HanapGawa</h1>
      <p class="tagline">Tawi-Tawi's local service marketplace.<br>Find trusted workers, book with confidence.</p>
    </div>

    <div class="features-block">
      <div class="feature-item" *ngFor="let f of features">
        <div class="feature-icon">
          <ion-icon [name]="f.icon"></ion-icon>
        </div>
        <div class="feature-copy">
          <strong>{{ f.title }}</strong>
          <span>{{ f.desc }}</span>
        </div>
      </div>
    </div>

    <div class="cta-block">
      <ion-button expand="block" size="large" color="primary" (click)="goToAuth()">
        Get Started
      </ion-button>
      <ion-button expand="block" fill="clear" color="medium" (click)="goToAuth()">
        I already have an account
      </ion-button>
    </div>
  </div>
</ion-content>
