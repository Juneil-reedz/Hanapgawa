<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="discover" href="/tabs/discover">
      <ion-icon name="search-outline"></ion-icon>
      <ion-label>Discover</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="bookings" href="/tabs/bookings">
      <ion-icon name="calendar-outline"></ion-icon>
      <ion-label>Bookings</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="jobs" href="/tabs/jobs">
      <ion-icon name="construct-outline"></ion-icon>
      <ion-label>Jobs</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="dashboard" href="/tabs/dashboard" *ngIf="isProvider">
      <ion-icon name="grid-outline"></ion-icon>
      <ion-label>Dashboard</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile" href="/tabs/profile">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Profile</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
